name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: 代码规范检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: 单元测试 (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: 运行测试
        run: npm test
        timeout-minutes: 5

  coverage:
    name: 覆盖率检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: 运行测试并生成覆盖率报告
        run: npm run test:coverage
        timeout-minutes: 5
      - name: 检查覆盖率阈值
        run: node scripts/quality-check.js --min-coverage 80

  openapi:
    name: OpenAPI 契约测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: 验证 OpenAPI 规范
        run: node --test tests/openapi.test.js
        timeout-minutes: 2

  quality:
    name: 综合质量门禁
    runs-on: ubuntu-latest
    needs: [lint, test, coverage, openapi]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: 运行完整质量检查
        run: npm run quality
        timeout-minutes: 10

  docker:
    name: Docker 构建验证
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - name: 构建 Docker 镜像
        run: docker build -t release-guardian:test .
      - name: 验证容器启动
        run: |
          docker run -d --name rg-test -p 3000:3000 release-guardian:test
          sleep 5
          curl -sf http://localhost:3000/health | grep -q "ok"
          docker stop rg-test
