apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "release-guardian.fullname" . }}
  labels:
    {{- include "release-guardian.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "release-guardian.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "release-guardian.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: RATE_LIMIT_ENABLED
              value: {{ .Values.config.rateLimitEnabled | quote }}
            - name: RATE_LIMIT_MAX
              value: {{ .Values.config.rateLimitMax | quote }}
            - name: RATE_LIMIT_WINDOW_MS
              value: {{ .Values.config.rateLimitWindowMs | quote }}
            {{- if .Values.secrets.apiKeys }}
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ include "release-guardian.fullname" . }}-secrets
                  key: api-keys
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /app/data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "release-guardian.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
