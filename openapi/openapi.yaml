openapi: 3.1.0
info:
  title: Release Guardian API
  version: 2.0.0
  description: Enterprise-grade release governance and audit API.
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Releases
  - name: Governance
  - name: Reporting
  - name: Webhooks
paths:
  /health:
    get:
      tags: [Health]
      summary: Health probe
      description: Returns a plain-text health response for load balancer liveness checks.
      responses:
        "200":
          description: Healthy
          content:
            text/plain:
              schema:
                type: string
              example: ok
  /ready:
    get:
      tags: [Health]
      summary: Readiness probe
      description: Returns 200 when the service is ready to accept traffic, 503 when the datastore is unhealthy.
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                data:
                  status: ready
                  generatedAt: "2026-06-18T12:00:00.000Z"
                  version: "2.0.0"
                  checks:
                    datastore:
                      status: ok
                      releaseCount: 42
                      teamCount: 3
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /api/releases:
    get:
      tags: [Releases]
      summary: List releases
      parameters:
        - $ref: "#/components/parameters/EnvironmentFilter"
        - $ref: "#/components/parameters/StatusFilter"
        - $ref: "#/components/parameters/RiskBandFilter"
        - $ref: "#/components/parameters/ApplicationFilter"
        - $ref: "#/components/parameters/OwnerFilter"
        - $ref: "#/components/parameters/PendingApprovalsFilter"
        - $ref: "#/components/parameters/SortFilter"
        - $ref: "#/components/parameters/OrderFilter"
        - $ref: "#/components/parameters/LimitFilter"
        - $ref: "#/components/parameters/OffsetFilter"
      responses:
        "200":
          description: Release list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseListResponse"
    post:
      tags: [Releases]
      summary: Create a release
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReleaseRequest"
            example:
              application: billing-api
              version: "2026.06.18"
              environment: production
              serviceTier: tier_1
              changeCategory: normal
              plannedStartAt: "2026-06-20T08:00:00.000Z"
              plannedEndAt: "2026-06-20T09:00:00.000Z"
              summary: Enable a new reconciliation workflow for enterprise invoices.
              components: [api, worker, scheduler]
              owner: alice
              controls:
                automatedTestsPassed: true
                rollbackReady: true
                monitoringReady: true
                securityReviewed: true
                customerImpactScore: 4
                dataSensitivityScore: 5
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/releases/bulk:
    post:
      tags: [Releases]
      summary: Bulk create releases
      description: Creates multiple releases in a single transactional request. Supports up to 50 items. Partial failures return created releases alongside per-item errors.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                releases:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    $ref: "#/components/schemas/CreateReleaseRequest"
              required: [releases]
            example:
              releases:
                - application: billing-api
                  version: "2026.06.18"
                  environment: production
                  serviceTier: tier_1
                  changeCategory: normal
                  plannedStartAt: "2026-06-20T08:00:00.000Z"
                  plannedEndAt: "2026-06-20T09:00:00.000Z"
                  summary: "Invoice reconciliation update"
                  components: [api, worker]
                  owner: alice
                  controls:
                    automatedTestsPassed: true
                    rollbackReady: true
                    monitoringReady: true
                    securityReviewed: true
                    customerImpactScore: 4
                    dataSensitivityScore: 5
      responses:
        "201":
          description: Bulk creation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/releases/{releaseId}:
    get:
      tags: [Releases]
      summary: Get release by ID
      parameters:
        - $ref: "#/components/parameters/ReleaseId"
      responses:
        "200":
          description: Release payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/releases/{releaseId}/evidence:
    get:
      tags: [Governance]
      summary: Retrieve audit evidence package for a release
      description: Returns control evidence, approval evidence, deployment outcome evidence, stable evidence identifiers, conflict checks, escalation flags, and remediation actions.
      parameters:
        - $ref: "#/components/parameters/ReleaseId"
      responses:
        "200":
          description: Evidence package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidencePackageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/releases/{releaseId}/conflicts:
    get:
      tags: [Governance]
      summary: Retrieve release-window conflicts for a release
      parameters:
        - $ref: "#/components/parameters/ReleaseId"
      responses:
        "200":
          description: Release-window conflict report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictReportResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/releases/{releaseId}/approvals:
    post:
      tags: [Governance]
      summary: Approve or reject a release
      description: Applies an approval or rejection decision from a specific team. The decision is recorded in the release timeline with the reviewer's identity and optional comment.
      parameters:
        - $ref: "#/components/parameters/ReleaseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewReleaseRequest"
            example:
              team: release_management
              decision: approved
              comment: "Reviewed and approved for production deployment."
      responses:
        "200":
          description: Updated release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/releases/{releaseId}/schedule:
    post:
      tags: [Governance]
      summary: Schedule an approved release
      description: Rejects the schedule request with `409 release_window_conflict` when the release overlaps another active release window.
      parameters:
        - $ref: "#/components/parameters/ReleaseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleReleaseRequest"
      responses:
        "200":
          description: Scheduled release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/releases/{releaseId}/deploy:
    post:
      tags: [Releases]
      summary: Record deployment outcome
      description: Records the deployment outcome including status, deployer identity, and optional notes. Updates dashboard metrics and release timeline.
      parameters:
        - $ref: "#/components/parameters/ReleaseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployReleaseRequest"
            example:
              status: success
              deployedBy: alice
              notes: "Deployment completed successfully, no issues observed."
      responses:
        "200":
          description: Deployment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/dashboard:
    get:
      tags: [Reporting]
      summary: Retrieve governance dashboard
      description: Returns aggregated governance metrics including release counts, risk distribution, approval SLA breaches, and change performance indicators.
      responses:
        "200":
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
  /api/escalations:
    get:
      tags: [Reporting]
      summary: Retrieve operational escalation summary
      description: Returns overdue approvals, high-risk pending releases, and release-window conflicts that require immediate attention.
      responses:
        "200":
          description: Escalation summary for overdue approvals, high-risk pending releases, and release-window conflicts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EscalationsResponse"
  /api/escalations/report:
    get:
      tags: [Reporting]
      summary: Retrieve executive escalation report
      description: Returns an auditable escalation report with stable audit identifiers, severity distribution, executive narrative, recommended remediation actions, and machine-readable report rows.
      responses:
        "200":
          description: Auditable escalation report with executive summary, severity counts, recommended actions, and machine-readable rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EscalationReportResponse"
  /api/policy:
    get:
      tags: [Governance]
      summary: Retrieve release governance policy
      description: Returns the complete governance policy snapshot including supported environments, release statuses, approval statuses, service tiers, risk bands, approval routing rules, and control score bounds.
      responses:
        "200":
          description: Policy payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
  /api/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhook subscriptions
      responses:
        "200":
          description: Webhook subscription list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Webhooks]
      summary: Create a webhook subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/webhooks/{webhookId}:
    delete:
      tags: [Webhooks]
      summary: Remove a webhook subscription
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Subscription removed
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/webhooks/events:
    get:
      tags: [Webhooks]
      summary: List webhook event log
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Webhook event log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEventLogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  parameters:
    ReleaseId:
      in: path
      name: releaseId
      required: true
      schema:
        type: string
      description: Release identifier.
    EnvironmentFilter:
      in: query
      name: environment
      schema:
        $ref: "#/components/schemas/Environment"
    StatusFilter:
      in: query
      name: status
      schema:
        $ref: "#/components/schemas/ReleaseStatus"
    RiskBandFilter:
      in: query
      name: riskBand
      schema:
        $ref: "#/components/schemas/RiskBand"
    ApplicationFilter:
      in: query
      name: application
      schema:
        type: string
    OwnerFilter:
      in: query
      name: owner
      schema:
        type: string
    PendingApprovalsFilter:
      in: query
      name: pendingApprovals
      schema:
        type: boolean
    SortFilter:
      in: query
      name: sort
      schema:
        type: string
        enum: [createdAt, updatedAt, riskScore, application, environment]
    OrderFilter:
      in: query
      name: order
      schema:
        type: string
        enum: [asc, desc]
    LimitFilter:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
    OffsetFilter:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
  responses:
    BadRequest:
      description: Invalid request body or query parameter.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with the current release state or governance policy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit window resets.
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Maximum requests allowed in the window.
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Requests remaining in the current window.
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp when the window resets.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnsupportedMediaType:
      description: Content-Type header is not supported.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PayloadTooLarge:
      description: Request body exceeds the maximum allowed size.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Environment:
      type: string
      enum: [development, staging, production]
    ReleaseStatus:
      type: string
      enum: [draft, pending_approval, approved, rejected, scheduled, deployed, rolled_back]
    ApprovalStatus:
      type: string
      enum: [pending, approved, rejected]
    RiskBand:
      type: string
      enum: [low, medium, high, critical]
    ApiEnvelope:
      type: object
      required: [data]
      properties:
        data: {}
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [validation_error, not_found, invalid_state, release_window_conflict]
            message:
              type: string
            details:
              type: object
    CreateReleaseRequest:
      type: object
      required:
        - application
        - version
        - environment
        - serviceTier
        - changeCategory
        - plannedStartAt
        - plannedEndAt
        - summary
        - components
        - owner
        - controls
      properties:
        application:
          type: string
        version:
          type: string
        environment:
          $ref: "#/components/schemas/Environment"
        serviceTier:
          type: string
          enum: [tier_1, tier_2, tier_3]
        changeCategory:
          type: string
          enum: [standard, normal, emergency]
        plannedStartAt:
          type: string
          format: date-time
        plannedEndAt:
          type: string
          format: date-time
        summary:
          type: string
          /api/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhook subscriptions
      responses:
        "200":
          description: Webhook subscription list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Webhooks]
      summary: Create a webhook subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/webhooks/{webhookId}:
    delete:
      tags: [Webhooks]
      summary: Remove a webhook subscription
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Subscription removed
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/webhooks/events:
    get:
      tags: [Webhooks]
      summary: List webhook event log
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Webhook event log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEventLogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
          type: array
          minItems: 1
          items:
            type: string
        owner:
          type: string
        controls:
          $ref: "#/components/schemas/Controls"
    Controls:
      type: object
      required:
        - automatedTestsPassed
        - rollbackReady
        - monitoringReady
        - securityReviewed
        - customerImpactScore
        - dataSensitivityScore
      properties:
        automatedTestsPassed:
          type: boolean
        rollbackReady:
          type: boolean
        monitoringReady:
          type: boolean
        securityReviewed:
          type: boolean
        customerImpactScore:
          type: integer
          minimum: 0
          maximum: 5
        dataSensitivityScore:
          type: integer
          minimum: 0
          maximum: 5
    ReviewReleaseRequest:
      type: object
      required: [team, actor, decision]
      properties:
        team:
          type: string
        actor:
          type: string
        decision:
          type: string
          enum: [approved, rejected]
        comment:
          type: string
    ScheduleReleaseRequest:
      type: object
      required: [actor, scheduledAt]
      properties:
        actor:
          type: string
        scheduledAt:
          type: string
          format: date-time
        rollbackPlan:
          type: string
    DeployReleaseRequest:
      type: object
      required: [actor, outcome]
      properties:
        actor:
          type: string
        outcome:
          type: string
          enum: [deployed, rolled_back]
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
    Release:
      type: object
      required:
        - id
        - application
        - version
        - environment
        - serviceTier
        - changeCategory
        - status
        - risk
        - approvals
        - timeline
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        application:
          type: string
        version:
          type: string
        environment:
          $ref: "#/components/schemas/Environment"
        serviceTier:
          type: string
          enum: [tier_1, tier_2, tier_3]
        changeCategory:
          type: string
          enum: [standard, normal, emergency]
        plannedStartAt:
          type: string
          format: date-time
        plannedEndAt:
          type: string
          format: date-time
        summary:
          type: string
          /api/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhook subscriptions
      responses:
        "200":
          description: Webhook subscription list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Webhooks]
      summary: Create a webhook subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/webhooks/{webhookId}:
    delete:
      tags: [Webhooks]
      summary: Remove a webhook subscription
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Subscription removed
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/webhooks/events:
    get:
      tags: [Webhooks]
      summary: List webhook event log
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Webhook event log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEventLogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
          type: array
          items:
            type: string
        controls:
          $ref: "#/components/schemas/Controls"
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseConflict"
        owner:
          type: string
        status:
          $ref: "#/components/schemas/ReleaseStatus"
        risk:
          $ref: "#/components/schemas/Risk"
        approvals:
          type: array
          items:
            $ref: "#/components/schemas/Approval"
        deployment:
          anyOf:
            - $ref: "#/components/schemas/Deployment"
            - type: "null"
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Risk:
      type: object
      required: [score, band, rationale]
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        band:
          $ref: "#/components/schemas/RiskBand"
        rationale:
          type: string
    Approval:
      type: object
      required: [team, displayName, status, requestedAt, slaHours, slaBreached]
      properties:
        team:
          type: string
        displayName:
          type: string
        status:
          $ref: "#/components/schemas/ApprovalStatus"
        actor:
          anyOf:
            - type: string
            - type: "null"
        comment:
          type: string
        requestedAt:
          type: string
          format: date-time
        updatedAt:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        slaHours:
          type: integer
        slaBreached:
          type: boolean
    Deployment:
      type: object
      properties:
        scheduledAt:
          type: string
          format: date-time
        startedAt:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        finishedAt:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        executedBy:
          type: string
        rollbackPlan:
          type: string
        outcome:
          type: string
          enum: [scheduled, deployed, rolled_back]
    TimelineEvent:
      type: object
      required: [at, type, actor, detail]
      properties:
        at:
          type: string
          format: date-time
        type:
          type: string
        actor:
          type: string
        detail:
          type: string
    ReleaseConflict:
      type: object
      required:
        - releaseId
        - application
        - version
        - environment
        - status
        - plannedStartAt
        - plannedEndAt
        - owner
        - riskBand
        - reason
      properties:
        releaseId:
          type: string
        application:
          type: string
        version:
          type: string
        environment:
          $ref: "#/components/schemas/Environment"
