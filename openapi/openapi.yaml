openapi: 3.1.0
info:
  title: Release Guardian API
  version: 1.0.0
  description: Enterprise-grade release governance and audit API.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Health probe
      responses:
        "200":
          description: Healthy
  /api/releases:
    get:
      summary: List releases
      parameters:
        - in: query
          name: environment
          schema:
            type: string
            enum: [development, staging, production]
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, pending_approval, approved, rejected, scheduled, deployed, rolled_back]
        - in: query
          name: riskBand
          schema:
            type: string
            enum: [low, medium, high, critical]
        - in: query
          name: application
          schema:
            type: string
        - in: query
          name: owner
          schema:
            type: string
        - in: query
          name: pendingApprovals
          schema:
            type: boolean
        - in: query
          name: sort
          schema:
            type: string
            enum: [createdAt, updatedAt, riskScore, application, environment]
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Release list
    post:
      summary: Create a release
      responses:
        "201":
          description: Created
  /api/releases/{releaseId}:
    get:
      summary: Get release by ID
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Release payload
  /api/releases/{releaseId}/evidence:
    get:
      summary: Retrieve audit evidence package for a release
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evidence package
  /api/releases/{releaseId}/approvals:
    post:
      summary: Approve or reject a release
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated release
  /api/releases/{releaseId}/schedule:
    post:
      summary: Schedule an approved release
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scheduled release
  /api/releases/{releaseId}/deploy:
    post:
      summary: Record deployment outcome
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deployment result
  /api/dashboard:
    get:
      summary: Retrieve governance dashboard
      responses:
        "200":
          description: Dashboard payload
  /api/policy:
    get:
      summary: Retrieve release governance policy
      responses:
        "200":
          description: Policy payload
