apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: release-guardian
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
configMapGenerator:
  - name: release-guardian-config
    behavior: merge
    literals:
      - LOG_LEVEL=warn
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_MAX=200
